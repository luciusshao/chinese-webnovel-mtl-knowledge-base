<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="shell site-header__inner">
        <a class="brand" href="{{ '/' | relative_url }}">
          <span class="brand__eyebrow">Public Knowledge Base</span>
          <span class="brand__title">{{ site.title }}</span>
        </a>
        <nav class="top-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a class="top-nav__cta" href="https://www.xiandaos.com/demo">Demo Translation</a>
          <a href="{{ '/navigation.html' | relative_url }}">Docs</a>
          <a href="{{ '/getting-started.html' | relative_url }}">Start</a>
          <a href="{{ '/glossary/glossary-principles.html' | relative_url }}">Glossary</a>
          <a href="{{ '/glossary-library.html' | relative_url }}">Downloads</a>
          <a href="{{ '/contribute-without-github.html' | relative_url }}">Contribute</a>
        </nav>
      </div>
    </header>

    <main class="shell page-shell">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="shell site-footer__inner">
        <div>
          <div class="footer-title">{{ site.title }}</div>
          <div class="footer-copy">{{ site.description }}</div>
        </div>
        <div class="footer-links">
          <a href="https://www.xiandaos.com/demo">Demo Translation</a>
          <a href="{{ '/navigation.html' | relative_url }}">Browse Docs</a>
          <a href="{{ '/glossary-library.html' | relative_url }}">Download Glossaries</a>
          <a href="{{ '/forms/glossary-submission-template.html' | relative_url }}">Submit Glossary</a>
          <a href="https://github.com/luciusshao/chinese-webnovel-mtl-knowledge-base">GitHub</a>
        </div>
      </div>
    </footer>
  </body>
</html>
